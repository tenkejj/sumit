<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oferowo — generator ofert PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #0a0a0a;
      --text-muted: #6b7280;
      --border: #e5e5e5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      padding: 96px 24px 96px;
      letter-spacing: -0.01em;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 56px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text);
      display: inline-block;
    }

    .tagline {
      margin: 12px 0 0;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .section + .section { margin-top: 32px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 0 0 20px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    input[type="text"],
    input[type="number"] {
      font: inherit;
      font-size: 14px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s ease;
      width: 100%;
      letter-spacing: -0.005em;
    }

    input::placeholder { color: var(--text-muted); }

    input:hover:not(:focus) {
      border-color: #d4d4d4;
    }

    input:focus {
      outline: none;
      border-color: var(--text);
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: -0.005em;
      padding: 0 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { padding-left: 0; }
    thead th:last-child { padding-right: 0; }

    tbody td {
      padding: 10px 8px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }
    tbody td:first-child { padding-left: 0; }
    tbody td:last-child { padding-right: 0; }
    tbody tr:last-child td { border-bottom: none; }

    .col-lp {
      width: 32px;
      text-align: left;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .col-nazwa { min-width: 180px; }
    .col-ilosc { width: 90px; }
    .col-cena  { width: 120px; }
    .col-akcja { width: 36px; text-align: right; }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: -0.005em;
      transition: color 0.15s ease;
    }
    .btn-add:hover { color: var(--text); }
    .btn-add .plus {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 14px;
      line-height: 1;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .btn-add:hover .plus {
      border-color: var(--text);
      color: var(--text);
    }

    .btn-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .btn-remove:hover {
      background: #f5f5f5;
      color: var(--text);
    }

    .submit-wrap { margin-top: 32px; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #0a0a0a;
      color: #ffffff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      transition: background 0.15s ease;
    }
    .btn-primary:hover:not(:disabled) {
      background: #262626;
    }
    .btn-primary:disabled {
      cursor: not-allowed;
      background: #525252;
    }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      letter-spacing: -0.005em;
      display: none;
      border: 1px solid var(--border);
    }
    .message.error {
      background: var(--bg);
      color: var(--text);
      border-color: var(--text);
      display: block;
    }
    .message.success {
      background: var(--bg);
      color: var(--text);
      border-color: var(--border);
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: -0.005em;
    }

    @media (max-width: 600px) {
      body { padding: 48px 20px 60px; }
      .header { margin-bottom: 36px; }
      .logo { font-size: 26px; }
      .card { padding: 28px 24px; }
      .row { grid-template-columns: 1fr; gap: 16px; }
      .section { margin-bottom: 32px; }

      table, thead, tbody, tr, td, th { display: block; }
      thead { display: none; }
      tbody tr {
        position: relative;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
      }
      tbody tr:last-child { border-bottom: none; }
      tbody td {
        padding: 6px 0;
        border: none;
        width: auto !important;
      }
      tbody td.col-lp {
        position: absolute;
        top: 16px;
        right: 36px;
        font-size: 12px;
      }
      tbody td.col-akcja {
        position: absolute;
        top: 12px;
        right: 0;
        text-align: right;
      }
      tbody td.col-nazwa { padding-right: 80px; }
      tbody td.col-ilosc::before { content: "Ilość"; }
      tbody td.col-cena::before  { content: "Cena jedn. (zł)"; }
      tbody td.col-ilosc, tbody td.col-cena {
        display: grid;
        grid-template-columns: 110px 1fr;
        align-items: center;
        gap: 12px;
      }
      tbody td.col-ilosc::before,
      tbody td.col-cena::before {
        font-size: 12px;
        color: var(--text-muted);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo">
        <span class="logo-dot"></span>
        <span>Oferowo</span>
      </div>
      <p class="tagline">Twórz oferty PDF w kilka sekund.</p>
    </header>

    <div class="card">
      <form id="oferta-form" autocomplete="off">
        <section class="section">
          <h2 class="section-title">Strony</h2>
          <div class="row">
            <div class="field">
              <label for="nazwa_firmy">Sprzedawca</label>
              <input type="text" id="nazwa_firmy" name="nazwa_firmy" placeholder="Nazwa Twojej firmy" required>
            </div>
            <div class="field">
              <label for="klient">Klient</label>
              <input type="text" id="klient" name="klient" placeholder="Nazwa klienta" required>
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">Pozycje</h2>
          <table>
            <thead>
              <tr>
                <th class="col-lp">#</th>
                <th class="col-nazwa">Nazwa</th>
                <th class="col-ilosc">Ilość</th>
                <th class="col-cena">Cena jedn. (zł)</th>
                <th class="col-akcja" aria-label="Akcje"></th>
              </tr>
            </thead>
            <tbody id="pozycje-tbody"></tbody>
          </table>

          <button type="button" class="btn-add" id="btn-dodaj">
            <span class="plus">+</span>
            <span>Dodaj pozycję</span>
          </button>
        </section>

        <div class="submit-wrap">
          <button type="submit" class="btn-primary" id="btn-generuj">Generuj PDF</button>
        </div>

        <div id="message" class="message"></div>
      </form>
    </div>

    <p class="footer">© Oferowo</p>
  </div>

  <script>
    const tbody = document.getElementById('pozycje-tbody');
    const btnDodaj = document.getElementById('btn-dodaj');
    const btnGeneruj = document.getElementById('btn-generuj');
    const form = document.getElementById('oferta-form');
    const message = document.getElementById('message');

    function odswiezNumery() {
      [...tbody.querySelectorAll('tr')].forEach((tr, i) => {
        tr.querySelector('.col-lp').textContent = i + 1;
      });
    }

    function dodajWiersz() {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="col-lp"></td>
        <td class="col-nazwa"><input type="text" class="in-nazwa" placeholder="np. Usługa konsultingowa" required></td>
        <td class="col-ilosc"><input type="number" class="in-ilosc" step="any" min="0" placeholder="1" required></td>
        <td class="col-cena"><input type="number" class="in-cena" step="0.01" min="0" placeholder="0,00" required></td>
        <td class="col-akcja">
          <button type="button" class="btn-remove" title="Usuń">&times;</button>
        </td>
      `;
      tr.querySelector('.btn-remove').addEventListener('click', () => {
        if (tbody.children.length <= 1) {
          pokazKomunikat('Musi pozostać co najmniej jedna pozycja.', 'error');
          return;
        }
        tr.remove();
        odswiezNumery();
      });
      tbody.appendChild(tr);
      odswiezNumery();
    }

    function pokazKomunikat(tekst, typ) {
      message.textContent = tekst;
      message.className = 'message ' + typ;
    }

    function ukryjKomunikat() {
      message.textContent = '';
      message.className = 'message';
    }

    btnDodaj.addEventListener('click', dodajWiersz);

    dodajWiersz();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ukryjKomunikat();

      const pozycje = [...tbody.querySelectorAll('tr')].map(tr => ({
        nazwa: tr.querySelector('.in-nazwa').value.trim(),
        ilosc: parseFloat(tr.querySelector('.in-ilosc').value),
        cena_jednostkowa: parseFloat(tr.querySelector('.in-cena').value),
      }));

      const payload = {
        nazwa_firmy: document.getElementById('nazwa_firmy').value.trim(),
        klient: document.getElementById('klient').value.trim(),
        pozycje: pozycje,
      };

      btnGeneruj.disabled = true;
      btnGeneruj.textContent = 'Generowanie...';

      try {
        const res = await fetch('/oferta', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const tekst = await res.text();
          throw new Error(tekst || `Błąd ${res.status}`);
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        const nazwaPliku = `oferta-${payload.klient.replace(/[^a-z0-9-_]+/gi, '_') || 'dokument'}.pdf`;
        const a = document.createElement('a');
        a.href = url;
        a.download = nazwaPliku;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        pokazKomunikat('PDF wygenerowany i pobrany.', 'success');
      } catch (err) {
        pokazKomunikat('Nie udało się wygenerować PDF: ' + err.message, 'error');
      } finally {
        btnGeneruj.disabled = false;
        btnGeneruj.textContent = 'Generuj PDF';
      }
    });
  </script>
</body>
</html>
